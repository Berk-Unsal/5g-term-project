# Source: open5gs-ueransim/templates/stack.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: smf
  namespace: 5g-core
  labels:
    app: smf
spec:
  replicas: 1
  selector:
    matchLabels:
      app: smf
  template:
    metadata:
      labels:
        app: smf
    spec:
      initContainers:
        - name: setup-freediameter
          image: busybox:latest
          imagePullPolicy: IfNotPresent
          command: ["mkdir", "-p", "/open5gs/install/etc/freeDiameter"]
          volumeMounts:
            - name: freediameter-vol
              mountPath: /open5gs/install/etc/freeDiameter
        - name: copy-freediameter-config
          image: busybox:latest
          imagePullPolicy: IfNotPresent
          command: ["cp", "/freediameter-config/smf.conf", "/open5gs/install/etc/freeDiameter/smf.conf"]
          volumeMounts:
            - name: freediameter-config
              mountPath: /freediameter-config
            - name: freediameter-vol
              mountPath: /open5gs/install/etc/freeDiameter
      containers:
        - name: smf
          image: docker.io/gradiant/open5gs:2.7.0
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "-c"]
          args: ["open5gs-smfd -c /open5gs/smf.yaml"]
          ports:
            - containerPort: 7777
            - containerPort: 8805
              protocol: UDP
            - containerPort: 2152
              protocol: UDP
          resources:
            limits:
              cpu: 500m
              memory: 512Mi
            requests:
              cpu: 200m
              memory: 256Mi
          volumeMounts:
            - name: config
              mountPath: /open5gs/smf.yaml
              subPath: smf.yaml
            - name: freediameter-config
              mountPath: /freediameter-config
            - name: freediameter-vol
              mountPath: /open5gs/install/etc/freeDiameter
      volumes:
        - name: config
          configMap:
            name: open5gs-config
        - name: freediameter-config
          configMap:
            name: freediameter-config
        - name: freediameter-vol
          emptyDir: {}
