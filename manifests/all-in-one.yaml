      labels:
        app: upf
    spec:
      containers:
        - name: upf
          image: docker.io/gradiant/open5gs:2.7.0
          imagePullPolicy: IfNotPresent
          securityContext:
            privileged: true
            capabilities:
              add: ["NET_ADMIN"]
          command: ["/bin/sh", "-c"]
          args: ["open5gs-upfd -c /open5gs/upf.yaml"]
          ports:
            - containerPort: 8805
              protocol: UDP
            - containerPort: 2152
              protocol: UDP
          resources:
            limits:
              cpu: 1000m
              memory: 1Gi
            requests:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: tun-device
              mountPath: /dev/net/tun
            - name: config
              mountPath: /open5gs/upf.yaml
              subPath: upf.yaml
      volumes:
        - name: tun-device
          hostPath:
            path: /dev/net/tun
            type: CharDevice
        - name: config
          configMap:
            name: open5gs-config
