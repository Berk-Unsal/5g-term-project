# Source: open5gs-ueransim/templates/stack.yaml
apiVersion: batch/v1
kind: Job
metadata:
  name: subscriber-bootstrap
  namespace: 5g-core
spec:
  backoffLimit: 5
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: bootstrap
          image: mongo:6.0
          imagePullPolicy: IfNotPresent
          resources:
            limits:
              cpu: 500m
              memory: 512Mi
            requests:
              cpu: 100m
              memory: 128Mi
          command: ["/bin/sh", "-c"]
          args:
            - |
              cat <<'EOF' >/tmp/subscriber.js
              db = db.getSiblingDB('open5gs');
              db.subscribers.updateOne(
                { "imsi": "001010000000001" },
                {
                  "$set": {
                    "imsi": "001010000000001",
                    "subscribed_rau_tau_timer": 12,
                    "network_access_mode": 0,
                    "subscriber_status": 0,
                    "access_restriction_data": 32,
                    "slice": [{
                      "sst": 1,
                      "sd": "000001",
                      "default_indicator": true,
                      "session": [{
                        "name": "internet",
                        "type": 3,
                        "pcc_rule": [],
                        "ambr": {"uplink": {"value": 1, "unit": 3}, "downlink": {"value": 1, "unit": 3}},
                        "qos": {"index": 9, "arp": {"priority_level": 8, "pre_emption_capability": 1, "pre_emption_vulnerability": 1}}
                      }]
                    }],
                    "ambr": {"uplink": {"value": 1, "unit": 3}, "downlink": {"value": 1, "unit": 3}},
                    "security": {
                      "k": "465B5CE8B199B49FAA5F0A2EE238A6BC",
                      "amf": "8000",
                      "op": null,
                      "opc": "E8ED289DEBA952E4283B54E88E6183CA"
                    },
                    "schema_version": 1,
                    "__v": 0
                  }
                },
                { upsert: true }
              );
              EOF
              mongosh "mongodb://mongodb:27017/open5gs" /tmp/subscriber.js
