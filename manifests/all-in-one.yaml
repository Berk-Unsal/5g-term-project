---
# Source: open5gs-ueransim/templates/stack.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: freediameter-config
  namespace: 5g-core
data:
  smf.conf: |
    # freeDiameter minimal configuration for SMF
    ListenOn = 127.0.0.1;
    Port = 3868;
    NoTLS;
---
# Source: open5gs-ueransim/templates/stack.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: open5gs-config
  namespace: 5g-core
data:
  nrf.yaml: |
    logger:
      level: info
    global:
      max:
        ue: 1024
    nrf:
      sbi:
        server:
          - address: 0.0.0.0
            port: 7777
  amf.yaml: |
    logger:
      level: info
    global:
      max:
        ue: 1024
        peer: 64
    amf:
      sbi:
        server:
          - address: 0.0.0.0
            port: 7777
        client:
          nrf:
            - uri: http://nrf:7777
      ngap:
        server:
          - address: 0.0.0.0
      guami:
        - plmn_id:
            mcc: "001"
            mnc: "01"
          amf_id:
            region: 2
            set: 1
      tai:
        - plmn_id:
            mcc: "001"
            mnc: "01"
          tac: "1"
      plmn_support:
        - plmn_id:
            mcc: "001"
            mnc: "01"
          s_nssai:
            - sst: 1
              sd: "000001"
      security:
        integrity_order: [ NIA2, NIA1, NIA0 ]
        ciphering_order: [ NEA0, NEA1, NEA2 ]
      network_name:
        full: Open5GS
      amf_name: open5gs-amf
      time:
        t3502:
          value: 720
        t3512:
          value: 540
  smf.yaml: |
    logger:
      level: info
    # Leave Diameter unset so SMF can start without a freeDiameter config file.
    global:
      max:
        ue: 1024
        peer: 64
    smf:
      sbi:
        server:
          - address: 0.0.0.0
            port: 7777
        client:
          nrf:
            - uri: http://nrf:7777
      pfcp:
        server:
          - address: 0.0.0.0
      gtpu:
        server:
          - address: 0.0.0.0
      session:
        - subnet: 10.45.0.1/16
          dnn: "internet"
      dns:
        - 8.8.8.8
      mtu: 1400
      ctf:
        enabled: no
      upf:
        - address: upf
  upf.yaml: |
    logger:
      level: info
    global:
      max:
        ue: 1024
        peer: 64
    upf:
      pfcp:
        server:
          - address: 0.0.0.0
      gtpu:
        server:
          - address: 0.0.0.0
      session:
        - subnet: 10.45.0.1/16
          dnn: "internet"
      smf:
        - address: smf
  ausf.yaml: |
    logger:
      level: info
    global:
      max:
        ue: 1024
        peer: 64
    ausf:
      sbi:
        server:
          - address: 0.0.0.0
            port: 7777
        client:
          nrf:
            - uri: http://nrf:7777
  udm.yaml: |
    logger:
      level: info
    global:
      max:
        ue: 1024
        peer: 64
    udm:
      sbi:
        server:
          - address: 0.0.0.0
            port: 7777
        client:
          nrf:
            - uri: http://nrf:7777
  udr.yaml: |
    db_uri: mongodb://mongodb/open5gs
    logger:
      level: info
    global:
      max:
        ue: 1024
        peer: 64
    udr:
      sbi:
        server:
          - address: 0.0.0.0
            port: 7777
        client:
          nrf:
            - uri: http://nrf:7777
---
# Source: open5gs-ueransim/templates/stack.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: ueransim-config
  namespace: 5g-core
data:
  gnb.yaml: |
    mcc: '001'
    mnc: '01'
    nci: '0x000000010'
    idLength: 32
    tac: 1
    linkIp: 127.0.0.1
    ngapIp: 0.0.0.0
    gtpIp: 0.0.0.0
    ignoreStreamIds: true
    amfConfigs:
      - address: amf
        port: 38412
    slices:
      - sst: 1
        sd: 000001
  ue.yaml: |
    supi: 'imsi-001010000000001'
    mcc: '001'
    mnc: '01'
    key: '465B5CE8B199B49FAA5F0A2EE238A6BC'
    op: '00000000000000000000000000000000'
    opc: 'E8ED289DEBA952E4283B54E88E6183CA'
    opType: 'OPC'
    amf: '8000'
    imei: '356938035643803'
    imeiSv: '4370816125816151'
    gnbSearchList:
      - gnb
    uacAic:
      mps: false
      mcs: false
    uacAcc:
      normalClass: 0
      class11: false
      class12: false
      class13: false
      class14: false
      class15: false
    sessions:
      - type: IPv4
        apn: internet
        slice:
          sst: 1
          sd: 000001
    integrityMaxRate:
      uplink: 64kbps
      downlink: 64kbps
    configuredNssai:
      - sst: 1
        sd: 000001
    defaultNssai:
      - sst: 1
        sd: 000001
    integrity:
      IA1: true
      IA2: true
      IA3: true
    ciphering:
      EA1: true
      EA2: true
      EA3: true
